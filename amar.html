<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <link rel="stylesheet" href="amar.css">
</head>
<body>
  <div class="contact-container">
    <div class="contact-box">
      <h1>Contact Form</h1>
      <form class="contact-form">
        <!-- Name -->
        <div class="input-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Enter your name" required>
        </div>

        <!-- Email -->
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <!-- Address -->
        <div class="input-group">
          <label for="address">Address</label>
          <input type="text" id="address" placeholder="Enter your address" required>
        </div>

        <!-- Phone Number -->
        <div class="input-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="Enter your phone number" required>
        </div>

        <!-- LinkedIn ID -->
        <div class="input-group">
          <label for="linkedin">LinkedIn ID</label>
          <input type="url" id="linkedin" placeholder="Enter your LinkedIn profile URL">
        </div>

        <!-- Description -->
        <div class="input-group">
          <label for="description">Description</label>
          <textarea id="description" placeholder="Write something about yourself..." rows="5"></textarea>
        </div>

        <!-- Location -->
        <div class="input-group">
          <label for="location">Location</label>
          <select id="location" required>
            <option value="">Select your location</option>
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="uk">UK</option>
            <option value="canada">Canada</option>
            <option value="australia">Australia</option>
          </select>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-button">Submit</button>
      </form>
    </div>
  </div>
</body>
</html>
